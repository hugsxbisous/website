<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embeddable Carousel Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="page">
  <section class="widget-shell">

    <div class="carousel" id="carouselWidget">
      <div class="viewport" id="carouselViewport"></div>

      <!-- overlay arrows -->
      <button class="arrow-btn arrow-left" id="prevBtn" aria-label="Previous slide">
        &lt;
      </button>

      <button class="arrow-btn arrow-right" id="nextBtn" aria-label="Next slide">
        &gt;
      </button>

      <!-- only dots remain below -->
      <div class="controls">
        <div class="dot-row" id="dotRow"></div>
      </div>
    </div>

  </section>
</main>

<script src="script.js"></script>
</body>
</html>
