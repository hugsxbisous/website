<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embeddable Carousel Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="page">
  <section class="widget-shell">
    <h2 id="pageHeading">Embeddable Carousel Widget</h2>
    <p id="pageIntro" class="intro"></p>

    <div class="carousel" id="carouselWidget">
      <div class="viewport" id="carouselViewport"></div>

      <div class="controls">
        <div class="arrow-group">
          <button class="arrow-btn" id="prevBtn" aria-label="Previous slide">←</button>
          <button class="arrow-btn" id="nextBtn" aria-label="Next slide">→</button>
        </div>

        <div class="status" id="statusText">Loading...</div>
        <div class="dot-row" id="dotRow"></div>
      </div>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
